name: Release

# Push a version tag (e.g. v0.1.0) to build native binaries per OS and attach
# them to a GitHub Release. systray is cgo; the macOS app is built as a universal
# binary on one Apple-Silicon runner (arm64 native + amd64 via clang -arch, lipo),
# so no Intel runner is needed. The pathguard CLI is pure Go.
#
# Each build job only produces artifacts; a single `publish` job uploads them to
# the release, so parallel jobs never race on the release and Windows needs no
# zip tool of its own.
#
# NOTE: builds are UNSIGNED (T-0015). macOS Gatekeeper / Windows SmartScreen will
# warn until code signing + notarization is added; the Homebrew cask clears the
# quarantine flag as a stopgap (see the msjang/homebrew-tap repo).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-14 # Apple Silicon; builds a universal (arm64+amd64) app, no Intel runner needed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Package universal .app + CLI
        run: bash scripts/package-macos.sh "${{ github.ref_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*.zip

  windows:
    runs-on: windows-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Build .exe + CLI
        shell: bash
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -H=windowsgui" -o "dist/Pathguard.exe" ./cmd/pathguard-gui
          go build -trimpath -ldflags "-s -w" -o "dist/pathguard.exe" ./cmd/pathguard
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*.exe

  linux-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Build CLI (pure Go, cross-compile)
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch go build -trimpath -ldflags "-s -w" -o dist/pathguard ./cmd/pathguard
            (cd dist && tar czf "pathguard-linux-$arch.tar.gz" pathguard && rm pathguard)
          done
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*.tar.gz

  publish:
    needs: [macos, windows, linux-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Assemble release assets
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' \) -exec cp {} dist/ \;
          # Zip the Windows binaries here (Linux has zip; the Windows runner does not need one).
          ( cd artifacts/windows && zip -q "$GITHUB_WORKSPACE/dist/Pathguard-windows-amd64.zip" Pathguard.exe pathguard.exe )
          ls -la dist
      - name: Clean stale release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          for a in $(gh release view "$GITHUB_REF_NAME" --json assets -q '.assets[].name' 2>/dev/null || true); do
            gh release delete-asset "$GITHUB_REF_NAME" "$a" -y || true
          done
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
