name: Release

# Push a version tag (e.g. v0.1.0) to build native binaries per OS and attach
# them to a GitHub Release. systray is cgo, so the macOS app is built natively
# on both an Apple-Silicon and an Intel runner (no cross-compile). The pathguard
# CLI is pure Go and cross-compiles for Linux.
#
# create-release runs first so the release exists before the build jobs upload
# to it (avoids the concurrent-creation race).
#
# NOTE: builds are UNSIGNED (T-0015). macOS Gatekeeper / Windows SmartScreen will
# warn until code signing + notarization is added; the Homebrew cask clears the
# quarantine flag as a stopgap (see the msjang/homebrew-tap repo).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  macos:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14, arch: arm64 }
          - { runner: macos-13, arch: amd64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Package .app + CLI
        run: bash scripts/package-macos.sh "${{ github.ref_name }}" "${{ matrix.arch }}"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Pathguard-macos-${{ matrix.arch }}.zip
            dist/pathguard-macos-${{ matrix.arch }}.zip

  windows:
    needs: create-release
    runs-on: windows-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Build .exe + CLI
        shell: bash
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -H=windowsgui" -o "dist/Pathguard.exe" ./cmd/pathguard-gui
          go build -trimpath -ldflags "-s -w" -o "dist/pathguard.exe" ./cmd/pathguard
          7z a "dist/Pathguard-windows-amd64.zip" "./dist/Pathguard.exe" "./dist/pathguard.exe"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/Pathguard-windows-amd64.zip

  linux-cli:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Build CLI (pure Go, cross-compile)
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch go build -trimpath -ldflags "-s -w" -o dist/pathguard ./cmd/pathguard
            (cd dist && tar czf "pathguard-linux-$arch.tar.gz" pathguard && rm pathguard)
          done
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/pathguard-linux-*.tar.gz
