name: Release

# Pushing a version tag (v*) creates a GitHub Release with generated notes.
# Building and attaching per-OS native binaries (systray is cgo, so no
# cross-compile — macOS/Windows runners each build natively) is T-0014.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
