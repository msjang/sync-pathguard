name: Release

# 버전 태그(v*)를 push 하면 GitHub Release를 만든다.
# 현재는 Python 스크립트를 첨부. Go 재구현(T-0014) 이후 3타깃 단일 바이너리를
# 빌드해 함께 첨부하도록 확장할 예정.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pathguard.py
            README.md
            LICENSE
          generate_release_notes: true
